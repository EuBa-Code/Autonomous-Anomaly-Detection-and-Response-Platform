# Batch Job Configuration — Machine Batch Features

# Data paths
paths:
  entitydf_dir:        "/app/data/entity_df/telemetry_data/0"
  offline_store_dir:   "/app/data/offline/machines_batch_features"

# Spark configuration
spark:
  app_name: "batch-feature-pipeline-washing-machines"
  master:   "local[*]"
  configs:
    "spark.sql.session.timeZone":    "UTC"
    "spark.sql.shuffle.partitions":  "16"
    "spark.driver.memory":           "4g"
    "spark.executor.memory":         "2g"

# Schema
schema:
  timestamp_column: "timestamp"

# Processing
processing:
  write_mode: "append"  

# Feast
feast:
  repo_path:     "/app/feature_store_service"
  feature_views:
    - "machine_batch_features"