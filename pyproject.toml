[project]
name = "Washing-Machines-Anomaly-Detection"
version = "0.1.0"
description = "Microservices architecture"
readme = "README.md"
requires-python = ">=3.12"

dependencies = [
    "python-dotenv>=1.2.1",
    "pydantic>=2.7,<2.12",
    "pandas>=2.0.0,<3.0.0",
    "joblib>=1.3.0", 
    "pyarrow>=19.0.1" 
]

[dependency-groups]

ingestion = [
    "quixstreams>=3.0.0",
    "confluent-kafka>=2.4,<2.12",
    "scikit-learn>=1.8.0",
    "scipy>=1.17.0",
    "numpy>=2.4.1",
]

hist_ingestion = [
    "pyspark>=4.1.1",
]

training_ml = [
    "numpy>=2.4.1",
    "pyarrow>=19.0.1",
    "scikit-learn>=1.8.0",
]
feature_store_apply = [
    "feast[redis]>=0.58.0",
]
dataset-creation = [
    "scikit-learn>=1.8.0",
    "sdv>=1.33.0",
]

[[tool.uv.index]]
name = "pytorch-cu126"
url = "https://download.pytorch.org/whl/cu126"
explicit = true
