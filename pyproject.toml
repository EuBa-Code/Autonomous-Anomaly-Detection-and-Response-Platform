[project]
name = "Washing-Machines-Anomaly-Detection"
version = "0.1.0"
description = "Microservices architecture"
readme = "README.md"
requires-python = ">=3.12"

dependencies = [
]

[dependency-groups]

ingestion = [
    "quixstreams>=3.0.0",
    "confluent-kafka>=2.4,<2.12",
    "scikit-learn>=1.8.0",
    "scipy>=1.17.0",
    "numpy>=2.4.1",
]


data-engineering = [
    "pyspark>=4.1.1",
    "pyyaml>=6.0.3",
]

training_ml = [
    "numpy>=2.4.1",
    "pyarrow>=19.0.1",
    "scikit-learn>=1.8.0",
]
feature-store = [
    "feast[redis]>=0.58.0",
]
dataset-creation-2 = [
    "scikit-learn>=1.8.0",
    "sdv>=1.33.0",
]
dataset-creation = [
    "pyspark>=4.1.1",
]
spark-services = [
    "pyspark>=4.1.1",
    "pyyaml>=6.0.3",
]
data-offline = [
    "pyarrow>=19.0.1",
]

[[tool.uv.index]]
name = "pytorch-cu126"
url = "https://download.pytorch.org/whl/cu126"
explicit = true
