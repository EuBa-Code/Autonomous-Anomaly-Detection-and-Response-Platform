services:
  # ============================================================================
  # REDPANDA - Message Broker (Kafka-compatible)
  # ============================================================================
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: redpanda_broker
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
      - --smp 1
      - --default-log-level=info
    ports:
      - "18081:18081" # Schema Registry
      - "18082:18082" # Pandaproxy
      - "19092:19092" # Kafka API (external)
      - "19644:9644" # Admin API
    volumes:
      - ./redpanda_storage:/var/lib/redpanda/data
    # healthcheck:
    #   test: [ "CMD", "rpk", "cluster", "health" ]
    #   interval: 20s
    #   timeout: 10s
    #   retries: 5
    #   start_period: 60s
    networks:
      - anomaly-detection-network

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:latest
    container_name: redpanda_console
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: redpanda:9092
      KAFKA_SCHEMAREGISTRY_ENABLED: "true"
      KAFKA_SCHEMAREGISTRY_URLS: http://redpanda:8081
    depends_on:
      redpanda:
        condition: service_started
    networks:
      - anomaly-detection-network

  redis:
    build:
      context: ./services/redis_service
      dockerfile: Dockerfile
    container_name: redis_online_store
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - anomaly-detection-network

  # Feast configuration to use Redis
  feature_store_apply:
    build:
      context: .
      dockerfile: services/feature_store_service/Dockerfile
    container_name: feature_store_apply
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      # Shared registry (must persist)
      - ./data/registry:/app/data/registry
      # Offline store data
      - ./data/offline:/app/data/offline
    networks:
      - anomaly-detection-network
    restart: 'no' # Run once only

  feature_store_service:
    build:
      context: .
      dockerfile: services/feature_store_service/Dockerfile
    container_name: feature_store_service
    depends_on:
      redis:
        condition: service_healthy
      feature_store_apply:
        condition: service_completed_successfully
    command: [ "uv", "run", "feast", "serve", "-h", "0.0.0.0", "-p", "8000" ]
    environment:
      - PYTHONUNBUFFERED=1
      - FEAST_REPO_PATH=/feature_store_service
    volumes:
      # Read-only access to registry
      - ./data/registry:/app/data/registry:ro
      # Read-only access to offline data
      - ./data/offline:/app/data/offline:ro
    ports:
      - '8001:8000'
    networks:
      - anomaly-detection-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 10s
      timeout: 3s
      retries: 3

  create_datasets:
    build:
      context: .
      dockerfile: services/Dockerfile.spark_services
    container_name: create_datasets
    # Override the command to run the specific module for this service
    command: [ "-m", "services.create_datasets_service.src.example_usage" ]
    environment:
      - APP_HOME=/app
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      - SPARK_DRIVER_MEMORY=4g
    volumes:
      - ./data:/app/data
    ports:
      - "4040:4040"
    shm_size: '2gb'
    networks:
      - anomaly-detection-network
    restart: "no"

  hist_ingestion:
    build:
      context: .
      dockerfile: services/Dockerfile.spark_services # Same Dockerfile of create_datasets!!
    container_name: historical_ingestion_service
    depends_on:
      create_datasets:
        condition: service_completed_successfully
    # Different command for this service
    command: [ "-m", "services.historical_ingestion_service.src.hist_ingestion" ]
    environment:
      - APP_HOME=/app
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      - SPARK_DRIVER_MEMORY=4g
    volumes:
      - ./data:/app/data
    ports:
      - "4041:4040"
    networks:
      - anomaly-detection-network
    shm_size: '2gb'
    restart: "no"

  feature_loader:
    build:
      context: .
      dockerfile: services/feature_loader_service/dockerfile
    container_name: feature_loader
    depends_on:
      redis:
        condition: service_healthy
      hist_ingestion:
        condition: service_completed_successfully
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - FEAST_REPO_PATH=/feature_loader_service
    volumes:
      - ./data:/app/data:ro
      - ./data/registry:/app/data/registry
    networks:
      - anomaly-detection-network
    restart: 'no'

  streaming_service:
    build:
      context: .
      dockerfile: services/streaming_service/dockerfile
    container_name: streaming_service
    depends_on:
      redpanda:
        condition: service_started
    environment:
      - PYTHONUNBUFFERED=1
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
      - FEAST_REPO_PATH=/streaming_service
    volumes:
      - ./data/models:/streaming_service/data/models:ro
      - ./data/registry:/app/data/registry
    networks:
      - anomaly-detection-network
    restart: unless-stopped

networks:
  anomaly-detection-network:
    driver: bridge
    name: anomaly-detection-network
