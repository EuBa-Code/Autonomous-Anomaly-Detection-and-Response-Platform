services:
  # ============================================================================
  # REDPANDA - Message Broker (Kafka-compatible)
  # ============================================================================
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: redpanda_broker
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
      - --smp 1
      - --default-log-level=info
    ports:
      - "18081:18081" # Schema Registry
      - "18082:18082" # Pandaproxy
      - "19092:19092" # Kafka API (external)
      - "19644:9644"  # Admin API
    volumes:
      - ./redpanda_storage:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - anomaly-detection-network

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:latest
    container_name: redpanda_console
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: redpanda:9092
      KAFKA_SCHEMAREGISTRY_ENABLED: "true"
      KAFKA_SCHEMAREGISTRY_URLS: http://redpanda:8081
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - anomaly-detection-network

  # ============================================================================
  # REDIS - Online Feature Store
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: redis
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - anomaly-detection-network

  # ============================================================================
  # FEAST APPLY - Register Feature Definitions (Run Once)
  # ============================================================================
  feature_store_apply:
    build: 
      context: .
      dockerfile: services/feature_store_service/Dockerfile
    container_name: feature_store_apply
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data/registry:/data/registry
      - ./data/offline:/data/offline
      - ./services/feature_store_service:/feature_store_service:ro
    networks:
      - anomaly-detection-network
    command: ["uv", "run", "feast", "apply"]
    restart: 'no'  # Run once only

  # ============================================================================
  # FEAST FEATURE SERVER - Serve Features via HTTP API
  # ============================================================================  
  feature_store_service:
    build: 
      context: .
      dockerfile: services/feature_store_service/Dockerfile
    container_name: feature_store_service
    depends_on:
      redis:
        condition: service_healthy
      feature_store_apply:
        condition: service_completed_successfully
    environment:
      - PYTHONUNBUFFERED=1
      - FEAST_REPO_PATH=/feature_store_service
    volumes:
      - ./data/registry:/data/registry
      - ./data/offline:/data/offline
      - ./services/feature_store_service:/feature_store_service:ro
    ports:
      - "6566:6566"
    networks:
      - anomaly-detection-network
    command: ["uv", "run", "feast", "serve", "--host", "0.0.0.0", "--port", "6566"]
    restart: unless-stopped

  # ============================================================================
  # DATA GENERATION & PROCESSING SERVICES
  # ============================================================================
  create_datasets:
    build:
      context: .
      dockerfile: services/Dockerfile.spark_services 
    container_name: create_datasets
    command: ["-m", "services.create_datasets_service.src.example_usage"]
    environment:
      - APP_HOME=/app
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      - SPARK_DRIVER_MEMORY=4g
    volumes:
      - ./data:/app/data
    ports:
      - "4040:4040"
    shm_size: '2gb'
    networks:
      - anomaly-detection-network
    restart: "no"

  data_engineering:
    build: 
      context: .
      dockerfile: services/Dockerfile.spark_services
    container_name: data_engineering_service
    depends_on:
      create_datasets:
        condition: service_completed_successfully
    command: ["-m", "services.data_engineering_service.src.data_engineering"]
    environment:
      - APP_HOME=/app
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      - SPARK_DRIVER_MEMORY=4g
    volumes:
      - ./data:/app/data
    ports:
      - "4041:4040"
    networks:
      - anomaly-detection-network
    shm_size: '2gb' 
    restart: "no"

  feature_loader:
    build:
      context: .
      dockerfile: services/feature_loader_service/Dockerfile
    container_name: feature_loader
    depends_on:
      redis:
        condition: service_healthy
      data_engineering:
        condition: service_completed_successfully
      feature_store_apply:
        condition: service_completed_successfully
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./data/processed_datasets:/app/data/processed_datasets:ro
      - ./data/synthetic_datasets:/app/data/synthetic_datasets:ro
    networks:
      - anomaly-detection-network
    restart: 'no'

networks:
  anomaly-detection-network:
    driver: bridge
    name: anomaly-detection-network

# Named volumes
volumes:
  redis_data:
    driver: local