services:
  # ============================================================================
  # REDPANDA - Message Broker (Kafka-compatible)
  # ============================================================================
  
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: redpanda_broker
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
      - --smp 1
      - --default-log-level=info
      - --overprovisioned
    ports:
      - "18081:18081"
      - "18082:18082"
      - "19092:19092"
      - "19644:9644"
    volumes:
      - ./redpanda_storage:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health", "--brokers", "localhost:9092"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - anomaly-detection-network

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:latest
    container_name: redpanda_console
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: redpanda:9092
      KAFKA_SCHEMAREGISTRY_ENABLED: "true"
      KAFKA_SCHEMAREGISTRY_URLS: http://redpanda:8081
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - anomaly-detection-network

  redpanda-init:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: redpanda_init
    entrypoint: [ "/bin/bash", "-c" ]
    command:
      - |
        sleep 5
        rpk topic create telemetry-data --brokers redpanda:9092 || true
        rpk topic create predictions --brokers redpanda:9092 || true
        rpk topic list --brokers redpanda:9092
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - anomaly-detection-network
    restart: "no"

  # ============================================================================
  # REDIS - Online Feature Store
  # ============================================================================
  redis:
    build:
      context: ./services/redis_service
      dockerfile: Dockerfile
    container_name: redis_online_store
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - anomaly-detection-network

  redis-insight:
    image: redis/redisinsight:latest
    container_name: redis_insight
    ports:
      - "5540:5540" 
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - anomaly-detection-network
    restart: unless-stopped

  # ============================================================================
  # FEAST APPLY - Register Feature Definitions (Run Once)
  # ============================================================================
  feature_store_apply:
    build:
      context: .
      dockerfile: services/feature_store_service/Dockerfile
    container_name: feature_store_apply
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data/registry:/data/registry
      - ./data/offline:/data/offline
      - ./services/feature_store_service/src:/feature_store_service/src
    command: [ "uv", "run", "feast", "apply" ]
    networks:
      - anomaly-detection-network
    restart: 'no'
    profiles: [ "setup" ]
    depends_on:
      redis:
        condition: service_healthy

  # ============================================================================
  # FEAST FEATURE SERVER - Serve Features via HTTP API
  # ============================================================================  
  feature_store_service:
    build:
      context: .
      dockerfile: services/feature_store_service/Dockerfile
    container_name: feature_store_service
    profiles: [ "online" ]
    environment:
      - PYTHONUNBUFFERED=1
      - FEAST_REPO_PATH=/feature_store_service
    volumes:
      - ./data/registry:/data/registry
      - ./data/offline:/data/offline
      - ./services/feature_store_service/src:/feature_store_service/src
    ports:
      - "8000:6566"
    depends_on:
      redis:
        condition: service_healthy
      feature_store_apply:
        condition: service_completed_successfully
      create_offline_files:
        condition: service_completed_succesfully
    networks:
      - anomaly-detection-network
    command: [ "uv", "run", "feast", "serve", "--host", "0.0.0.0", "--port", "6566" ]
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s = socket.socket(); s.connect(('localhost', 6566))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s 
    restart: unless-stopped
    restart: unless-stopped

  # ============================================================================
  # DATA GENERATION & PROCESSING SERVICES
  # ============================================================================
  create_datasets:
    build:
      context: .
      dockerfile: services/dockerfile.spark_services
    container_name: create_datasets
    command: [ "-m", "services.create_datasets_service.src.example_usage" ]
    environment:
      - APP_HOME=/app
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      - SPARK_DRIVER_MEMORY=2g
    volumes:
      - ./data:/app/data
    ports:
      - "4040:4040"
    shm_size: '2gb'
    networks:
      - anomaly-detection-network
    restart: "no"

  data_engineering:
    build:
      context: .
      dockerfile: services/dockerfile.spark_services
    container_name: data_engineering_service
    command: [ "-m", "services.data_engineering_service.src.data_engineering" ]
    environment:
      - APP_HOME=/app
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      - SPARK_DRIVER_MEMORY=2g
    volumes:
      - ./data:/app/data
      - ./services/data_engineering_service:/app/services/data_engineering_service 
    ports:
      - "4041:4040"
    depends_on:
      create_datasets:
        condition: service_completed_successfully
    networks:
      - anomaly-detection-network
    shm_size: '2gb'
    restart: "no"

  batch_feature_pipeline:
    build:
      context: .
      dockerfile: services/dockerfile.spark_services
    container_name: batch_feature_pipeline
    command: [ "-m", "batch_pipeline_service.src.batch_pipeline" ] 
    environment:
      - APP_HOME=/app
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - SPARK_DRIVER_MEMORY=2g
      - CONFIG_PATH=/app/batch_pipeline_service/src/config.yaml
    volumes:
      - ./data:/app/data
      - ./services/batch_pipeline_service:/app/batch_pipeline_service
      - ./services/data_engineering_service:/app/data_engineering_service
      - ./services/feature_store_service/src:/app/feature_store_service
    shm_size: '2gb'
    networks:
      - anomaly-detection-network
    restart: "no"

  create_offline_files:
    build:
      context: .
      dockerfile: utils/offline_files_util/Dockerfile
    container_name: offline_files_util
    volumes:
      - ./data:/data
    depends_on:
      create_offline_files:
        condition: service_completed_succesfully
    networks:
      - anomaly-detection-network
    restart: "no" 

  cold_start:
    build: 
      context: .
      dockerfile: utils/cold_start_util/Dockerfile
    container_name: cold_start_util
    profiles: [ "online" ]  
    volumes:
      - ./data/registry:/data/registry
      - ./data/offline:/data/offline
      - ./services/feature_store_service/src:/cold_start_util/feature_store_service:ro
    depends_on:
      redis:
        condition: service_healthy
      feature_store_service:
        condition: service_healthy
      data_engineering:
        condition: service_completed_successfully
    networks:
      - anomaly-detection-network
    restart: "no"

  # ============================================================================
  # PRODUCER - Sends telemetry data to Redpanda
  # ============================================================================
  producer_service:
    build:
      context: .
      dockerfile: services/producer_service/dockerfile
    container_name: telemetry_producer
    environment:
      - PYTHONUNBUFFERED=1
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
    volumes:
      - ./data/synthetic_datasets:/producer/data/streaming_data:ro
    depends_on:
      redpanda:
        condition: service_healthy
    depends_on:
      create_datasets:
        condition: service_completed_successfully
    networks:
      - anomaly-detection-network
    restart: 'no'

  # ============================================================================
  # TRAINING SERVICE - Fits preprocessor + trains Isolation Forest model
  # ============================================================================
  training_service:
    build:
      context: .
      dockerfile: services/training_service/dockerfile
    container_name: training_service
    profiles: [ "setup" ]
    deploy:
      resources:
        limits:
          memory: 4g
        reservations:
          memory: 2g
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/data
      - ./data/models:/training_service/models
      - ./data/metrics:/training_service/metrics
      - ./outputs:/outputs
    depends_on:
      data_engineering:
        condition: service_completed_successfully
    networks:
      - anomaly-detection-network
    restart: 'no'

  # ============================================================================
  # RETRAINING SERVICE - Weekly IsolationForest retraining
  # ============================================================================
  retraining_service:
    build:
      context: .
      dockerfile: services/retraining_service/Dockerfile
    container_name: retraining_service
    environment:
      - PYTHONUNBUFFERED=1
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - FEAST_REPO_PATH=/feature_store
      - GIT_PYTHON_REFRESH=quiet
    volumes:
      - ./data/registry:/data/registry:ro                              
      - ./data/offline:/data/offline:ro                                
      - ./data/entity_df:/datalake:ro  
      - ./services/feature_store_service/src:/feature_store:ro         
      - ./outputs:/outputs       
    depends_on:
      feature_store_service:
        condition: service_healthy                              
    networks:
      - anomaly-detection-network
    restart: "no"   # batch job — Airflow re-creates the container each week

  # ============================================================================
  # STREAMING SERVICE - Real-time feature engineering (Quix Streams)
  # ============================================================================
  streaming_service:
    build:
      context: .
      dockerfile: services/streaming_service/dockerfile
    container_name: streaming_service
    profiles: [ "online" ]
    environment:
      - PYTHONUNBUFFERED=1
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
      - FEAST_REPO_PATH=/streaming_service
      - DATALAKE_DIR=/data/entity_df        
      - DATALAKE_FORMAT=parquet
    volumes:
      - ./data/models:/streaming_service/data/models:ro
      - ./data/registry:/data/registry
      - ./data/offline:/data/offline 
      - ./data/entity_df:/data/entity_df
    depends_on:
      redpanda:
        condition: service_healthy
      feature_store_service:
        condition: service_healthy
    networks:
      - anomaly-detection-network
    restart: unless-stopped

  # ============================================================================
  # MLFLOW SERVER - Model Registry
  # ============================================================================
  mlflow:
    build:
      context: .
      dockerfile: services/mlflow/Dockerfile
    container_name: mlflow
    command:
      - uv
      - run
      - mlflow
      - server
      - --host
      - "0.0.0.0"
      - --port
      - "5000"
      - --backend-store-uri
      - sqlite:////mlruns/mlflow.db
      - --artifacts-destination
      - /mlruns/artifacts
      - --serve-artifacts
      - --allowed-hosts
      - "*"
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlruns
    restart: unless-stopped
    networks:
      - anomaly-detection-network

  # ============================================================================
  # INFERENCE SERVICE - Serving Predictions via FastAPI + Redpanda Integration
  # ============================================================================
  inference_service:
    build:
      context: .
      dockerfile: services/inference_service/dockerfile
    container_name: inference_service
    profiles: [ "online" ]
    environment:
      - PYTHONUNBUFFERED=1
      - FEAST_REPO_PATH=/inference_service
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
    volumes:
      # Model Artifacts (Model + Preprocessor)
      - ./data/models:/inference_service/data/models:ro
      # Feast Registry and Configuration
      - ./data/registry:/data/registry:ro
      - ./services/feature_store_service/src/feature_store.yaml:/inference_service/feature_store.yaml:ro
      - ./outputs:/inference_service/outputs:ro
    ports:
      - "8001:8000"
    depends_on:
      redpanda:
        condition: service_healthy
      feature_store_service:
        condition: service_healthy
    networks:
      - anomaly-detection-network
    restart: unless-stopped

# ============================================================================
  # AIRFLOW - Orchestration
  # ============================================================================
  postgres_airflow:
    image: postgres:13
    container_name: postgres_airflow
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    networks:
      - anomaly-detection-network

  airflow-webserver:
    build: 
      context: .
      dockerfile: ./services/airflow_service/Dockerfile
    container_name: airflow_webserver
    command: webserver
    ports:
      - "8081:8080" 
    environment: &airflow-common-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres_airflow/airflow
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      FEAST_REPO_PATH: /opt/airflow/feature_store
      MLFLOW_TRACKING_URI: http://mlflow:5000
      HOST_PROJECT_DIR: ${PWD}
      RETRAINING_IMAGE: retraining_service:latest  
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./services/feature_store_service/src:/opt/airflow/feature_store:ro
      - ./data:/opt/airflow/data
      - /var/run/docker.sock:/var/run/docker.sock 
    user: "${AIRFLOW_UID:-50000}:0"
    networks:
      - anomaly-detection-network

  airflow-scheduler:
    build: 
      context: .
      dockerfile: ./services/airflow_service/Dockerfile
    container_name: airflow_scheduler
    command: scheduler
    environment: *airflow-common-env
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./services/feature_store_service/src:/opt/airflow/feature_store:ro
      - ./data:/opt/airflow/data
      - /var/run/docker.sock:/var/run/docker.sock  
    user: "${AIRFLOW_UID:-50000}:0"
    networks:
      - anomaly-detection-network

  airflow-init:
    build: 
      context: .
      dockerfile: ./services/airflow_service/Dockerfile
    container_name: airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init &&
        airflow users create \
          --username airflow \
          --firstname admin \
          --lastname admin \
          --role Admin \
          --email admin@example.com \
          --password airflow
    environment: *airflow-common-env
    user: "${AIRFLOW_UID:-50000}:0"
    networks:
      - anomaly-detection-network

  # ============================================================================
  # IF ANOMALY TRUE - RedPanda consumer → dispatches to MCP Client API
  # ============================================================================
  if_anomaly:
    build:
      context: .
      dockerfile: services/if_anomaly_service/Dockerfile
    container_name: if_anomaly_service
    profiles: [ "online" ]
    command: [ "-m", "src.anomaly_consumer" ]
    environment:
      - PYTHONPATH=/if_anomaly_service
      - LOG_LEVEL=INFO
      - MCP_API_URL=http://langchain_service:8010   
      - REDPANDA_BROKERS=redpanda:9092
      - PREDICTIONS_TOPIC=predictions
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - anomaly-detection-network
    restart: unless-stopped                          


  # Used for debugging ONLY
  fakeproducer:
    build:
      context: .
      dockerfile: services/if_anomaly_service/Dockerfile
    container_name: fakeproducer
    command: [ "-m", "src.fakeproducer" ]
    environment:
      - PYTHONPATH=/if_anomaly_service
      - LOG_LEVEL=INFO  
    networks:
      - anomaly-detection-network
    restart: "no"

  # ============================================================================
  # MONGODB - Document Database (stores investigation reports + entity history)
  # ============================================================================
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-admin}
      MONGO_INITDB_DATABASE: anomaly_reports
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - anomaly-detection-network
    restart: unless-stopped

  # ============================================================================
  # MCP SERVER - FastMCP + Hybrid RAG Retrieval (Qdrant dense+sparse + rerank)
  # ============================================================================
  mcp_server:
    build:
      context: .
      dockerfile: services/mcp_server_service/Dockerfile
    container_name: mcp_server
    profiles: [ "online" ]
    env_file:
      - .env                              # QDRANT_API_KEY
    environment:
      - PYTHONUNBUFFERED=1
      - MODE=both                         # REST + FastMCP SSE on same port
      - QDRANT_COLLECTION=ingestion_rag_service  
    ports:
      - "8020:8020"
    networks:
      - anomaly-detection-network
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    deploy:
      resources:
        limits:
          memory: 4G        # Increase as needed
        reservations:
          memory: 2G
    ports:
      - "6333:6333" # HTTP API 
      - "6334:6334" # gRPC API 
    environment:
      - QDRANT__STORAGE__ON_DISK_PAYLOAD=true
    volumes:
      - ./services/mcp_server_service/qdrant/config/qdrant_config.yaml:/qdrant/config/production.yaml 
      - ./qdrant_data:/qdrant/storage
    networks:
      - anomaly-detection-network

  ingestion_rag:
    build:
      context: .
      dockerfile: services/ingestion_rag_service/Dockerfile
    container_name: ingestion_rag_service
    runtime: nvidia
    environment:
      - PYTHONPATH=/ingestion_rag_service
      - HF_HOME=/ingestion_rag_service/models/hugging_face      
      - FASTEMBED_CACHE_PATH=/ingestion_rag_service/models/fastembed  
      - NVIDIA_VISIBLE_DEVICES=all           
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility  
    volumes:
      - ./rag_files:/ingestion_rag_service/rag_files:ro
      - ./local_models:/ingestion_rag_service/models    
    networks:
      - anomaly-detection-network
      
  # --------------------------------------------------------------------------
  # vLLM - Local LLM server (OpenAI-compatible API)
  # Requires NVIDIA GPU. Model is cached in ./local_models/hf_cache.
  # --------------------------------------------------------------------------
  vllm:
    build:
      context: .
      dockerfile: services/vllm_service/Dockerfile
    container_name: vllm
    profiles: [ "online" ]
    runtime: nvidia                       
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_HOME=/root/.cache/huggingface
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
      - PYTORCH_ALLOC_CONF=expandable_segments:True   
    volumes:
      - ./local_models/hf_cache:/root/.cache/huggingface  
    ports:
      - "8222:8000"
    networks:
      - anomaly-detection-network
    restart: unless-stopped                

  # --------------------------------------------------------------------------
  # LANGCHAIN SERVICE - LangGraph agent (MCP client → vLLM)
  # --------------------------------------------------------------------------
  langchain_service:
    build:
      context: .
      dockerfile: services/langchain_service/Dockerfile
    container_name: langchain_service
    profiles: [ "online" ]
    environment:
      - PYTHONUNBUFFERED=1
      - MCP_SERVER_URI=http://mcp_server:8020/mcp
      - VLLM_BASE_URL=http://vllm:8000/v1
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
    ports:
      - "8010:8010"
    networks:
      - anomaly-detection-network
    restart: unless-stopped

networks:
  anomaly-detection-network:
    driver: bridge
    name: anomaly-detection-network

volumes:
  redis_data:
    driver: local
  mlflow_data:
    driver: local
  qdrant_data:
    driver: local
  mongodb_data:
    driver: local